<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Details | Britnae Thomas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#C9A84C; --gold-light:#E8C97A; --gold-pale:#F5EDD6;
    --cream:#FAF7F2; --dark:#0E0E0E; --charcoal:#1A1A1A;
    --mid:#3A3A3A; --soft:#8A8070; --border:#E8E2D9;
    --white:#FFFFFF; --bg:#F5F5F5;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--dark); overflow-x:hidden; }

  /* NAV */
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:20px 60px; background:rgba(14,14,14,0.95); backdrop-filter:blur(14px); border-bottom:1px solid rgba(201,168,76,0.2); }
  .nav-logo { font-size:1.05rem; font-weight:600; letter-spacing:0.08em; color:var(--gold); text-decoration:none; text-transform:uppercase; }
  .nav-links { display:flex; gap:36px; list-style:none; }
  .nav-links a { font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.65); text-decoration:none; transition:color 0.3s; }
  .nav-links a:hover { color:var(--gold); }
  .nav-cta { font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; background:var(--gold); color:var(--dark); padding:10px 22px; text-decoration:none; font-weight:600; transition:background 0.3s; }
  .nav-cta:hover { background:var(--gold-light); }
  .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; }
  .hamburger span { display:block; width:24px; height:2px; background:white; transition:all 0.3s; }
  .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
  .hamburger.open span:nth-child(2){opacity:0;}
  .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
  .mobile-menu { display:none; position:fixed; top:64px; left:0; right:0; z-index:99; background:rgba(14,14,14,0.97); backdrop-filter:blur(14px); padding:28px 24px 36px; flex-direction:column; border-bottom:1px solid rgba(201,168,76,0.2); }
  .mobile-menu.open{display:flex;}
  .mobile-menu a { font-size:0.95rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.75); text-decoration:none; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.07); }
  .mobile-menu a:last-child{border-bottom:none;}
  .mobile-menu a.cta-mobile { margin-top:18px; background:var(--gold); color:var(--dark); padding:16px 24px; text-align:center; font-weight:600; border-bottom:none; }

  /* APP CONTAINER */
  #app { padding-top:64px; }

  /* NOT FOUND */
  .not-found { text-align:center; padding:120px 40px; }
  .not-found h2 { font-size:2rem; font-weight:300; margin-bottom:16px; }
  .not-found p { color:var(--soft); margin-bottom:32px; }

  /* ═══ ZILLOW-STYLE LAYOUT ═══ */

  /* FULL WIDTH PHOTO SECTION */
  .photo-section { background:var(--dark); position:relative; }

  /* DESKTOP GRID GALLERY */
  .photo-grid { display:grid; grid-template-columns:2fr 1fr 1fr; grid-template-rows:320px 220px; gap:3px; cursor:pointer; }
  .photo-grid-main { grid-row:span 2; overflow:hidden; position:relative; }
  .photo-grid-thumb { overflow:hidden; position:relative; }
  .photo-grid-main img, .photo-grid-thumb img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s; display:block; }
  .photo-grid-main:hover img, .photo-grid-thumb:hover img { transform:scale(1.03); }
  .photo-grid-more { position:absolute; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; }
  .photo-grid-more span { color:white; font-size:0.85rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; }
  .view-all-btn { position:absolute; bottom:20px; right:20px; background:white; color:var(--dark); padding:10px 18px; font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; border:none; display:flex; align-items:center; gap:8px; transition:background 0.2s; z-index:2; font-family:'Outfit',sans-serif; }
  .view-all-btn:hover { background:var(--gold-pale); }

  /* MOBILE CAROUSEL */
  .carousel { display:none; position:relative; overflow:hidden; background:var(--dark); height:280px; }
  .carousel-track { display:flex; height:100%; transition:transform 0.35s ease; }
  .carousel-slide { flex:0 0 100%; height:100%; overflow:hidden; }
  .carousel-slide img { width:100%; height:100%; object-fit:cover; }
  .carousel-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.55); color:white; border:none; width:36px; height:36px; font-size:1.1rem; cursor:pointer; z-index:2; display:flex; align-items:center; justify-content:center; }
  .carousel-prev { left:12px; }
  .carousel-next { right:12px; }
  .carousel-dots { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:5px; }
  .carousel-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.45); border:none; cursor:pointer; padding:0; transition:background 0.2s; }
  .carousel-dot.active { background:white; }
  .carousel-counter { position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.55); color:white; font-size:0.72rem; padding:4px 10px; }

  /* MAIN CONTENT AREA — Zillow style wide layout */
  .prop-content { max-width:1280px; margin:0 auto; padding:0 40px 80px; }

  /* PRICE BAR — full width sticky bar like Zillow */
  .price-bar { background:white; border-bottom:1px solid var(--border); padding:0 40px; position:sticky; top:64px; z-index:50; }
  .price-bar-inner { max-width:1280px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:64px; gap:24px; }
  .price-bar-left { display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
  .price-main { font-size:1.8rem; font-weight:600; color:var(--dark); line-height:1; }
  .price-deposit { font-size:0.75rem; background:var(--gold); color:var(--dark); padding:3px 10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; }
  .price-bar-specs { display:flex; gap:20px; align-items:center; }
  .pb-spec { font-size:0.82rem; color:var(--mid); display:flex; align-items:center; gap:5px; }
  .pb-dot { width:3px; height:3px; border-radius:50%; background:var(--soft); }
  .price-bar-actions { display:flex; gap:10px; }
  .pb-btn { padding:9px 20px; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:600; font-family:'Outfit',sans-serif; cursor:pointer; border:none; text-decoration:none; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .pb-btn-primary { background:var(--gold); color:var(--dark); transition:background 0.2s; }
  .pb-btn-primary:hover { background:var(--gold-light); }
  .pb-btn-outline { background:transparent; color:var(--dark); border:1.5px solid var(--dark); transition:all 0.2s; }
  .pb-btn-outline:hover { background:var(--dark); color:white; }

  /* TWO COLUMN LAYOUT */
  .prop-grid { display:grid; grid-template-columns:1fr 380px; gap:40px; align-items:start; padding-top:36px; }

  /* LEFT COLUMN */
  .prop-left {}

  /* ADDRESS BLOCK */
  .prop-address-block { margin-bottom:28px; }
  .prop-tag-pill { display:inline-block; background:var(--gold-pale); color:var(--gold); font-size:0.65rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; padding:4px 12px; margin-bottom:12px; }
  .prop-address-main { font-size:1.35rem; font-weight:500; color:var(--dark); margin-bottom:4px; }
  .prop-address-sub { font-size:0.9rem; color:var(--soft); }

  /* QUICK STATS — Zillow style boxes */
  .quick-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:0; border:1px solid var(--border); background:white; margin-bottom:32px; }
  .qs-item { padding:20px 16px; border-right:1px solid var(--border); text-align:center; }
  .qs-item:last-child { border-right:none; }
  .qs-val { font-size:1.5rem; font-weight:600; color:var(--dark); line-height:1; margin-bottom:5px; }
  .qs-key { font-size:0.62rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--soft); }

  /* DEPOSIT HIGHLIGHT */
  .deposit-highlight { display:flex; align-items:center; gap:16px; background:var(--charcoal); padding:18px 24px; margin-bottom:32px; }
  .dh-icon { font-size:1.8rem; flex-shrink:0; }
  .dh-text { flex:1; }
  .dh-label { font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-bottom:3px; }
  .dh-value { font-size:1.2rem; font-weight:500; color:var(--gold); }
  .dh-note { font-size:0.75rem; color:rgba(255,255,255,0.4); margin-top:2px; }

  /* SECTIONS */
  .prop-section { background:white; padding:28px 28px; margin-bottom:16px; border:1px solid var(--border); }
  .section-title { font-size:1rem; font-weight:600; color:var(--dark); margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .section-title-icon { font-size:1rem; }
  .prop-desc { font-size:0.92rem; line-height:1.85; color:var(--mid); font-weight:300; }
  .read-more { background:none; border:none; color:var(--gold); font-size:0.82rem; font-weight:600; cursor:pointer; margin-top:10px; font-family:'Outfit',sans-serif; padding:0; display:block; }

  /* FEATURES GRID */
  .features-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .feature-item { display:flex; align-items:center; gap:10px; font-size:0.82rem; color:var(--mid); padding:10px 12px; background:var(--bg); }
  .feature-check { color:var(--gold); font-weight:700; flex-shrink:0; font-size:0.9rem; }

  /* MAP */
  .map-embed { width:100%; height:300px; border:none; display:block; filter:grayscale(10%); }
  .map-footer-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--charcoal); flex-wrap:wrap; gap:8px; }
  .map-addr-text { font-size:0.8rem; color:rgba(255,255,255,0.7); }
  .map-open-link { font-size:0.7rem; color:var(--gold); text-decoration:none; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; }

  /* SIMILAR PROPERTIES */
  .similar-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .sim-card { background:white; overflow:hidden; cursor:pointer; border:1px solid var(--border); text-decoration:none; display:block; transition:box-shadow 0.3s,transform 0.3s; }
  .sim-card:hover { transform:translateY(-4px); box-shadow:0 8px 32px rgba(0,0,0,0.1); }
  .sim-img { height:150px; overflow:hidden; position:relative; }
  .sim-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s; }
  .sim-card:hover .sim-img img { transform:scale(1.05); }
  .sim-tag { position:absolute; top:10px; left:10px; background:var(--gold); color:var(--dark); font-size:0.58rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; padding:3px 8px; }
  .sim-body { padding:14px 16px; }
  .sim-price { font-size:1.1rem; font-weight:600; color:var(--dark); margin-bottom:4px; }
  .sim-addr { font-size:0.72rem; color:var(--soft); margin-bottom:8px; }
  .sim-specs { display:flex; gap:12px; }
  .sim-spec { font-size:0.7rem; color:var(--mid); display:flex; align-items:center; gap:4px; }

  /* RIGHT SIDEBAR */
  .prop-right { position:sticky; top:136px; }

  /* CONTACT CARD */
  .contact-card { background:white; border:1px solid var(--border); overflow:hidden; box-shadow:0 2px 20px rgba(0,0,0,0.08); }
  .cc-price { padding:24px 24px 16px; border-bottom:1px solid var(--border); }
  .cc-price-main { font-size:2rem; font-weight:600; color:var(--dark); line-height:1; margin-bottom:4px; }
  .cc-price-sub { font-size:0.75rem; color:var(--soft); }
  .cc-actions { padding:20px 24px; display:flex; flex-direction:column; gap:10px; border-bottom:1px solid var(--border); }
  .cc-btn { padding:14px 20px; font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:600; font-family:'Outfit',sans-serif; cursor:pointer; border:none; text-decoration:none; display:block; text-align:center; transition:all 0.2s; }
  .cc-btn-gold { background:var(--gold); color:var(--dark); }
  .cc-btn-gold:hover { background:var(--gold-light); }
  .cc-btn-dark { background:var(--charcoal); color:white; }
  .cc-btn-dark:hover { background:var(--dark); }
  .cc-btn-outline { background:transparent; color:var(--dark); border:1.5px solid var(--border); }
  .cc-btn-outline:hover { border-color:var(--gold); color:var(--gold); }
  .cc-details { padding:20px 24px; display:flex; flex-direction:column; gap:12px; border-bottom:1px solid var(--border); }
  .cc-row { display:flex; justify-content:space-between; align-items:center; font-size:0.82rem; }
  .cc-row-key { color:var(--soft); }
  .cc-row-val { color:var(--dark); font-weight:500; }
  .cc-agent { padding:20px 24px; display:flex; align-items:center; gap:14px; }
  .cc-avatar { width:52px; height:52px; border-radius:50%; overflow:hidden; flex-shrink:0; border:2px solid var(--gold); }
  .cc-avatar img { width:100%; height:100%; object-fit:cover; }
  .cc-agent-name { font-size:0.9rem; font-weight:600; color:var(--dark); margin-bottom:2px; }
  .cc-agent-title { font-size:0.7rem; color:var(--soft); margin-bottom:6px; }
  .cc-ig { display:flex; align-items:center; gap:6px; font-size:0.7rem; color:var(--soft); text-decoration:none; transition:color 0.2s; }
  .cc-ig:hover { color:var(--gold); }

  /* BREADCRUMB */
  .breadcrumb-bar { background:white; border-bottom:1px solid var(--border); padding:0 40px; }
  .breadcrumb-inner { max-width:1280px; margin:0 auto; display:flex; align-items:center; gap:8px; height:44px; }
  .breadcrumb-inner a { font-size:0.72rem; color:var(--soft); text-decoration:none; transition:color 0.2s; letter-spacing:0.06em; }
  .breadcrumb-inner a:hover { color:var(--gold); }
  .breadcrumb-inner span { font-size:0.72rem; color:var(--border); }
  .breadcrumb-inner .bc-current { font-size:0.72rem; color:var(--dark); font-weight:500; }

  /* LIGHTBOX */
  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
  .lightbox.open { display:flex; }
  .lightbox-close { position:absolute; top:20px; right:24px; background:none; border:none; color:white; font-size:1.8rem; cursor:pointer; z-index:10; line-height:1; opacity:0.7; transition:opacity 0.2s; }
  .lightbox-close:hover { opacity:1; }
  .lightbox-counter { position:absolute; top:24px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.6); font-size:0.78rem; letter-spacing:0.16em; }
  .lightbox-track-wrap { width:100%; max-width:1100px; overflow:hidden; }
  .lightbox-track { display:flex; align-items:center; }
  .lightbox-slide { flex:0 0 100%; display:flex; align-items:center; justify-content:center; padding:60px 20px; }
  .lightbox-slide img { max-height:80vh; max-width:100%; object-fit:contain; }
  .lightbox-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.12); border:none; color:white; width:48px; height:48px; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
  .lightbox-prev { left:20px; }
  .lightbox-next { right:20px; }
  .lightbox-btn:hover { background:rgba(255,255,255,0.25); }
  .lightbox-dots { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
  .lightbox-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; cursor:pointer; padding:0; transition:background 0.2s; }
  .lightbox-dot.active { background:var(--gold); }

  /* GALLERY VIDEO */
  .gallery-video-wrap { width:100%; height:100%; position:relative; background:#000; }
  .gallery-video-wrap iframe { width:100%; height:100%; border:none; display:block; }
  .gallery-video-wrap video { width:100%; height:100%; object-fit:cover; display:block; }

  /* BUTTONS */
  .btn-primary { background:var(--gold); color:var(--dark); padding:14px 28px; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; font-weight:600; text-decoration:none; display:inline-block; font-family:'Outfit',sans-serif; transition:background 0.2s; border:none; cursor:pointer; }
  .btn-primary:hover { background:var(--gold-light); }

  /* RESPONSIVE */
  @media (max-width:1024px) {
    .prop-grid { grid-template-columns:1fr; display:flex; flex-direction:column; }
    .prop-right { position:static; order:3; }
    .prop-left { order:1; }
    .prop-similar { order:4; }
    .price-bar-specs { display:none; }
    .prop-left .prop-section:last-of-type { margin-bottom:0; }
  }
  @media (max-width:768px) {
    nav { padding:16px 20px; }
    .nav-links, .nav-cta { display:none; }
    .hamburger { display:flex; }
    .photo-grid { display:none; }
    .carousel { display:block; }
    .price-bar { padding:0 20px; }
    .price-bar-inner { height:auto; padding:12px 0; flex-wrap:wrap; gap:8px; }
    .price-main { font-size:1.4rem; }
    .price-bar-actions { display:none; }
    .breadcrumb-bar { padding:0 20px; }
    .prop-content { padding:0 20px 60px; }
    .quick-stats { grid-template-columns:repeat(2,1fr); }
    .qs-item:nth-child(2) { border-right:none; }
    .features-grid { grid-template-columns:1fr; }
    .similar-grid { grid-template-columns:1fr 1fr; }
  }
  @media (max-width:480px) {
    .similar-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">Britnae Thomas</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="listings.html">Listings</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="contact.html" class="nav-cta">Book Consultation</a>
  <div class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html" onclick="closeMenu()">Home</a>
  <a href="listings.html" onclick="closeMenu()">Listings</a>
  <a href="about.html" onclick="closeMenu()">About</a>
  <a href="contact.html" onclick="closeMenu()">Contact</a>
  <a href="contact.html" class="cta-mobile" onclick="closeMenu()">Book Consultation</a>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOnBg(event)">
  <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
  <div class="lightbox-track-wrap">
    <div class="lightbox-track" id="lightboxTrack"></div>
  </div>
  <button class="lightbox-btn lightbox-prev" onclick="lightboxMove(-1)">&#8592;</button>
  <button class="lightbox-btn lightbox-next" onclick="lightboxMove(1)">&#8594;</button>
  <div class="lightbox-dots" id="lightboxDots"></div>
</div>

<!-- APP -->
<div id="app"></div>

<script>
const GITHUB_USER = 'Ayomidebrain01';
const GITHUB_REPO = 'britnea_thomas';
const CDN_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/properties.json`;
const CACHE_KEY = 'bt_properties_cache';

function getCached() {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY));
    if (c && Array.isArray(c.data)) return c.data;
    localStorage.removeItem(CACHE_KEY);
    return null;
  } catch(e) { localStorage.removeItem(CACHE_KEY); return null; }
}

function setCached(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
}

let ALL_PROPERTIES = [];
let CURRENT_IMAGES = [];

function getSimilar(prop) {
  const tags = Array.isArray(prop.tags) ? prop.tags : [];
  return ALL_PROPERTIES
    .filter(p => p.id !== prop.id && (p.market === prop.market || (Array.isArray(p.tags) && p.tags.some(t => tags.includes(t)))))
    .slice(0, 3);
}

function normalise(p) {
  return {
    ...p,
    mapQuery: p.map_query || p.mapQuery || '',
    images: Array.isArray(p.images) ? p.images : [],
    features: Array.isArray(p.features) ? p.features : [],
    tags: Array.isArray(p.tags) ? p.tags : [],
  };
}

function render(prop) {
  const app = document.getElementById('app');
  if (!prop) {
    app.innerHTML = `<div class="not-found"><h2>Property Not Found</h2><p>This listing may have been removed.</p><a href="listings.html" class="btn-primary" style="display:inline-block;margin-top:20px;">Back to Listings</a></div>`;
    return;
  }

  document.title = `${prop.address} | Britnae Thomas`;
  CURRENT_IMAGES = prop.images;
  const similar = getSimilar(prop);
  const imgs = prop.images;

  app.innerHTML = `
    <!-- BREADCRUMB -->
    <div class="breadcrumb-bar">
      <div class="breadcrumb-inner">
        <a href="index.html">Home</a>
        <span>/</span>
        <a href="listings.html">Listings</a>
        <span>/</span>
        <span class="bc-current">${prop.address}</span>
      </div>
    </div>

    <!-- MOBILE CAROUSEL -->
    <div class="carousel" id="carousel">
      <div class="carousel-track" id="carouselTrack">

function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open');document.getElementById('hamburger').classList.toggle('open');}
function closeMenu(){document.getElementById('mobileMenu').classList.remove('open');document.getElementById('hamburger').classList.remove('open');}

// ═══ CAROUSEL ═══
let carouselIndex = 0;
let touchStartX = 0;

function carouselSync() {
  const slides = document.querySelectorAll('.carousel-slide');
  if (!slides.length) return;
  document.getElementById('carouselTrack').style.transform = `translateX(-${carouselIndex * 100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i === carouselIndex));
  const counter = document.getElementById('carouselCounter');
  if (counter) counter.textContent = `${carouselIndex + 1} / ${slides.length}`;
}

function carouselMove(dir) {
  const total = document.querySelectorAll('.carousel-slide').length;
  carouselIndex = (carouselIndex + dir + total) % total;
  carouselSync();
}

function carouselGo(i) { carouselIndex = i; carouselSync(); }

function initCarouselTouch() {
  const c = document.getElementById('carousel');
  if (!c) return;
  c.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive:true });
  c.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].screenX;
    if (Math.abs(diff) > 40) carouselMove(diff > 0 ? 1 : -1);
  }, { passive:true });
}

// ═══ LIGHTBOX ═══
let lightboxImages = [];
let lightboxIndex = 0;
let lbTouchStartX = 0;

function openLightbox(imgs, idx) {
  lightboxImages = imgs;
  lightboxIndex = idx;
  const track = document.getElementById('lightboxTrack');
  track.innerHTML = imgs.map(src => `<div class="lightbox-slide"><img src="${src}" draggable="false"></div>`).join('');
  const dots = document.getElementById('lightboxDots');
  dots.innerHTML = imgs.map((_,i) => `<button class="lightbox-dot ${i===idx?'active':''}" onclick="lightboxGo(${i})"></button>`).join('');
  updateLightbox(false);
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  const wrap = track.parentElement;
  wrap.ontouchstart = e => { lbTouchStartX = e.changedTouches[0].screenX; };
  wrap.ontouchend = e => {
    const diff = lbTouchStartX - e.changedTouches[0].screenX;
    if (Math.abs(diff) > 40) lightboxMove(diff > 0 ? 1 : -1);
  };
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
function closeLightboxOnBg(e) { if (e.target === document.getElementById('lightbox')) closeLightbox(); }
function lightboxMove(dir) { lightboxIndex = (lightboxIndex + dir + lightboxImages.length) % lightboxImages.length; updateLightbox(true); }
function lightboxGo(i) { lightboxIndex = i; updateLightbox(true); }

function updateLightbox(animate) {
  const track = document.getElementById('lightboxTrack');
  const slideWidth = track.parentElement.offsetWidth;
  track.style.transition = animate ? 'transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
  track.style.transform = `translateX(-${lightboxIndex * slideWidth}px)`;
  document.querySelectorAll('.lightbox-dot').forEach((d,i) => d.classList.toggle('active', i === lightboxIndex));
  document.getElementById('lightboxCounter').textContent = `${lightboxIndex + 1} / ${lightboxImages.length}`;
}

window.addEventListener('resize', () => {
  if (document.getElementById('lightbox').classList.contains('open')) updateLightbox(false);
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') lightboxMove(1);
  if (e.key === 'ArrowLeft') lightboxMove(-1);
  if (e.key === 'Escape') closeLightbox();
});

// ═══ LOAD ═══
async function loadProperty() {
  const app = document.getElementById('app');
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    app.innerHTML = `<div class="not-found"><h2>No property specified.</h2><a href="listings.html" class="btn-primary" style="margin-top:20px;display:inline-block;">Back to Listings</a></div>`;
    return;
  }

  // Skeleton
  app.innerHTML = `
    <div style="padding-top:64px;">
      <div style="background:white;border-bottom:1px solid #e8e2d9;height:44px;"></div>
      <div style="background:#111;height:540px;animation:pulse 1.5s ease-in-out infinite;"></div>
      <div style="background:white;border-bottom:1px solid #e8e2d9;height:64px;"></div>
      <div style="max-width:1280px;margin:0 auto;padding:36px 40px;display:grid;grid-template-columns:1fr 380px;gap:40px;">
        <div>
          <div style="height:20px;width:200px;background:#e0d8cc;margin-bottom:20px;animation:pulse 1.5s infinite;"></div>
          <div style="height:40px;width:300px;background:#e0d8cc;margin-bottom:12px;animation:pulse 1.5s infinite;"></div>
          <div style="height:100px;background:#e0d8cc;margin-bottom:24px;animation:pulse 1.5s infinite;"></div>
          <div style="height:200px;background:#e0d8cc;animation:pulse 1.5s infinite;"></div>
        </div>
        <div style="height:400px;background:#e0d8cc;animation:pulse 1.5s infinite;"></div>
      </div>
    </div>
    <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}</style>`;

  // Show cached instantly
  const cached = getCached();
  if (cached) {
    ALL_PROPERTIES = cached.map(normalise);
    const cachedProp = ALL_PROPERTIES.find(p => String(p.id) === String(id));
    if (cachedProp) try { render(cachedProp); } catch(e) {}
  }

  try {
    const res = await fetch(CDN_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error();
    const allArr = await res.json();
    if (!Array.isArray(allArr)) throw new Error();
    setCached(allArr);
    ALL_PROPERTIES = allArr.map(normalise);
    const prop = ALL_PROPERTIES.find(p => String(p.id) === String(id)) || null;
    if (prop) try { render(prop); } catch(e) { console.error(e); }
    else app.innerHTML = `<div class="not-found"><h2>Property Not Found</h2><p>This listing may have been removed.</p><a href="listings.html" class="btn-primary" style="margin-top:20px;display:inline-block;">Back to Listings</a></div>`;
  } catch(e) {
    if (!cached) app.innerHTML = `<div class="not-found"><h2>Failed to load.</h2><p>Please check your connection.</p><a href="listings.html" class="btn-primary" style="margin-top:20px;display:inline-block;">Back to Listings</a></div>`;
  }
}

loadProperty();
</script>

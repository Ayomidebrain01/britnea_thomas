<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Details | Britnae Thomas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  :root { --gold:#C9A84C; --gold-light:#E8C97A; --cream:#FAF7F2; --dark:#0E0E0E; --charcoal:#1A1A1A; --mid:#3A3A3A; --soft:#8A8070; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { font-family:'Outfit',sans-serif; background:var(--cream); color:var(--dark); overflow-x:hidden; }

  /* NAV */
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:20px 60px; background:rgba(14,14,14,0.92); backdrop-filter:blur(14px); border-bottom:1px solid rgba(201,168,76,0.2); }
  .nav-logo { font-size:1.05rem; font-weight:600; letter-spacing:0.08em; color:var(--gold); text-decoration:none; text-transform:uppercase; }
  .nav-links { display:flex; gap:36px; list-style:none; }
  .nav-links a { font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.65); text-decoration:none; transition:color 0.3s; }
  .nav-links a:hover, .nav-links a.active { color:var(--gold); }
  .nav-cta { font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; background:var(--gold); color:var(--dark); padding:10px 22px; text-decoration:none; font-weight:600; transition:background 0.3s; }
  .nav-cta:hover { background:var(--gold-light); }
  .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; }
  .hamburger span { display:block; width:24px; height:2px; background:white; transition:all 0.3s; }
  .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
  .hamburger.open span:nth-child(2){opacity:0;}
  .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
  .mobile-menu { display:none; position:fixed; top:64px; left:0; right:0; z-index:99; background:rgba(14,14,14,0.97); backdrop-filter:blur(14px); padding:28px 24px 36px; flex-direction:column; border-bottom:1px solid rgba(201,168,76,0.2); }
  .mobile-menu.open{display:flex;}
  .mobile-menu a { font-size:0.95rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.75); text-decoration:none; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.07); }
  .mobile-menu a:last-child{border-bottom:none;}
  .mobile-menu a.cta-mobile { margin-top:18px; background:var(--gold); color:var(--dark); padding:16px 24px; text-align:center; font-weight:600; border-bottom:none; }

  /* BREADCRUMB */
  .breadcrumb { padding:96px 60px 0; display:flex; align-items:center; gap:10px; }
  .breadcrumb a { font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--soft); text-decoration:none; transition:color 0.3s; }
  .breadcrumb a:hover { color:var(--gold); }
  .breadcrumb span { font-size:0.7rem; color:rgba(0,0,0,0.2); }
  .breadcrumb .current { font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); font-weight:500; }

  .gallery-video-wrap { width:100%; height:100%; position:relative; }
  .gallery-video-wrap iframe { width:100%; height:100%; border:none; display:block; }

  /* HERO IMAGE GALLERY */
  .gallery { padding:24px 60px 0; display:grid; grid-template-columns:2fr 1fr 1fr; grid-template-rows:280px 280px; gap:10px; }
  .gallery-main { grid-row:span 2; position:relative; overflow:hidden; cursor:pointer; }
  .gallery-thumb { position:relative; overflow:hidden; cursor:pointer; }
  .gallery-main img, .gallery-thumb img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s; }
  .gallery-main:hover img, .gallery-thumb:hover img { transform:scale(1.04); }
  .gallery-more { position:absolute; inset:0; background:rgba(14,14,14,0.55); display:flex; align-items:center; justify-content:center; }
  .gallery-more span { font-size:0.8rem; letter-spacing:0.18em; text-transform:uppercase; color:white; font-weight:600; }

  /* MAIN LAYOUT */
  .detail-layout { padding:48px 60px 80px; display:grid; grid-template-columns:1fr 380px; gap:56px; align-items:start; }

  /* LEFT */
  .detail-left {}
  .prop-tag { font-size:0.62rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .prop-tag::before { content:''; width:22px; height:1px; background:var(--gold); display:block; }
  .prop-price { font-family:'Outfit',sans-serif; font-size:clamp(2.2rem,4vw,3rem); font-weight:300; color:var(--dark); line-height:1; margin-bottom:8px; }
  .prop-address { font-size:0.9rem; color:var(--soft); margin-bottom:28px; }
  .prop-specs-row { display:flex; gap:0; margin-bottom:36px; border:1px solid rgba(0,0,0,0.09); }
  .prop-spec { flex:1; padding:18px 20px; border-right:1px solid rgba(0,0,0,0.09); }
  .prop-spec:last-child { border-right:none; }
  .spec-val { font-size:1.3rem; font-weight:400; color:var(--dark); line-height:1; }
  .spec-key { font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--soft); margin-top:5px; }

  /* DEPOSIT HIGHLIGHT */
  .deposit-bar { background:var(--charcoal); padding:20px 28px; display:flex; align-items:center; justify-content:space-between; margin-bottom:36px; gap:16px; flex-wrap:wrap; }
  .deposit-bar-left { display:flex; align-items:center; gap:16px; }
  .deposit-icon { font-size:1.6rem; }
  .deposit-text .label { font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.45); }
  .deposit-text .value { font-size:1.4rem; font-weight:400; color:var(--gold); }
  .deposit-note { font-size:0.78rem; color:rgba(255,255,255,0.45); font-weight:300; }

  /* DESCRIPTION */
  .section-label { font-size:0.65rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .section-label::before { content:''; width:22px; height:1px; background:var(--gold); display:block; }
  .prop-desc { font-size:0.92rem; line-height:1.85; color:var(--mid); font-weight:300; margin-bottom:44px; }

  /* FEATURES */
  .features-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:44px; }
  .feature { display:flex; align-items:center; gap:10px; font-size:0.82rem; color:var(--mid); padding:12px 16px; background:white; }
  .feature::before { content:'✓'; color:var(--gold); font-weight:700; font-size:0.8rem; flex-shrink:0; }

  /* MAP EMBED */
  .map-wrap { margin-bottom:44px; }
  .map-embed { width:100%; height:340px; border:none; display:block; filter:grayscale(15%); transition:filter 0.3s; }
  .map-embed:hover { filter:grayscale(0%); }
  .map-footer { background:var(--charcoal); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .map-area-label { display:flex; align-items:center; gap:10px; }
  .map-pin-icon { font-size:1rem; }
  .map-area-text { font-size:0.8rem; color:rgba(255,255,255,0.75); font-weight:300; }
  .map-area-text strong { color:var(--gold); font-weight:600; }
  .map-open-link { font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); text-decoration:none; font-weight:600; border-bottom:1px solid rgba(201,168,76,0.4); padding-bottom:1px; transition:opacity 0.2s; white-space:nowrap; }
  .map-open-link:hover { opacity:0.7; }

  /* SIMILAR */
  .similar-section { margin-bottom:0; }
  .similar-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:24px; }
  .sim-card { background:white; overflow:hidden; cursor:pointer; box-shadow:0 2px 16px rgba(0,0,0,0.07); transition:transform 0.3s,box-shadow 0.3s; text-decoration:none; display:block; }
  .sim-card:hover { transform:translateY(-5px); box-shadow:0 12px 36px rgba(0,0,0,0.13); }
  .sim-img { height:160px; overflow:hidden; }
  .sim-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s; }
  .sim-card:hover .sim-img img { transform:scale(1.05); }
  .sim-body { padding:16px 18px; }
  .sim-price { font-size:1.2rem; font-weight:400; color:var(--dark); margin-bottom:3px; }
  .sim-addr { font-size:0.72rem; color:var(--soft); }

  /* RIGHT SIDEBAR */
  .detail-right { position:sticky; top:100px; }
  .sidebar-card { background:white; box-shadow:0 4px 32px rgba(0,0,0,0.1); }
  .sidebar-header { background:var(--charcoal); padding:28px 32px; }
  .sidebar-header-title { font-size:0.65rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
  .sidebar-header-name { font-family:'Outfit',sans-serif; font-size:1.3rem; font-weight:400; color:white; }
  .sidebar-body { padding:28px 32px; display:flex; flex-direction:column; gap:14px; }
  .sidebar-price-row { display:flex; justify-content:space-between; align-items:baseline; padding-bottom:16px; border-bottom:1px solid rgba(0,0,0,0.07); }
  .sidebar-price { font-size:1.8rem; font-weight:400; color:var(--dark); }
  .sidebar-deposit { font-size:0.72rem; color:var(--gold); font-weight:600; letter-spacing:0.08em; }
  .btn-primary { background:var(--gold); color:var(--dark); padding:16px 24px; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; font-weight:600; text-decoration:none; text-align:center; display:block; font-family:'Outfit',sans-serif; transition:all 0.3s; border:none; cursor:pointer; width:100%; }
  .btn-primary:hover { background:var(--gold-light); }
  .btn-secondary { background:var(--charcoal); color:white; padding:16px 24px; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; font-weight:600; text-decoration:none; text-align:center; display:block; font-family:'Outfit',sans-serif; transition:all 0.3s; }
  .btn-secondary:hover { background:var(--dark); }
  .sidebar-divider { height:1px; background:rgba(0,0,0,0.07); }
  .sidebar-detail-row { display:flex; justify-content:space-between; font-size:0.82rem; }
  .sdk { color:var(--soft); }
  .sdv { color:var(--dark); font-weight:500; }
  .sidebar-agent { display:flex; align-items:center; gap:14px; padding-top:4px; }
  .agent-avatar { width:48px; height:48px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:700; color:var(--dark); flex-shrink:0; overflow:hidden; }
  .agent-avatar img { width:100%; height:100%; object-fit:cover; }
  .agent-name { font-size:0.88rem; font-weight:600; color:var(--dark); }
  .agent-title { font-size:0.7rem; color:var(--soft); margin-top:2px; }
  .sidebar-ig { display:flex; align-items:center; gap:8px; font-size:0.72rem; color:var(--soft); text-decoration:none; transition:color 0.3s; }
  .sidebar-ig:hover { color:var(--gold); }

  /* LIGHTBOX */
  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:999; display:none; align-items:center; justify-content:center; }
  .lightbox.open { display:flex; }
  .lightbox-img { max-width:92vw; max-height:90vh; object-fit:contain; display:block; user-select:none; }
  .lightbox-close { position:absolute; top:20px; right:24px; background:none; border:none; color:white; font-size:2rem; cursor:pointer; opacity:0.7; transition:opacity 0.2s; z-index:10; line-height:1; }
  .lightbox-close:hover { opacity:1; }
  .lightbox-prev, .lightbox-next { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.1); border:none; color:white; font-size:1.4rem; width:52px; height:52px; cursor:pointer; transition:background 0.2s; display:flex; align-items:center; justify-content:center; }
  .lightbox-prev:hover, .lightbox-next:hover { background:rgba(201,168,76,0.7); }
  .lightbox-prev { left:16px; }
  .lightbox-next { right:16px; }
  .lightbox-counter { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.5); font-size:0.75rem; letter-spacing:0.14em; }
  .gallery-main, .gallery-thumb { cursor:zoom-in !important; }
  .carousel-slide img { cursor:zoom-in; }

  /* MOBILE SIDEBAR POSITION — contact card before similar on mobile */
  @media(max-width:1024px) {
    .detail-layout { display:flex; flex-direction:column; }
    .detail-left { order:1; }
    .detail-right { order:2; }
    .similar-section { order:3; }
  }
  footer { background:var(--charcoal); padding:40px 60px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(201,168,76,0.15); flex-wrap:wrap; gap:16px; }
  .footer-logo { font-size:0.95rem; font-weight:600; color:var(--gold); letter-spacing:0.1em; text-transform:uppercase; }
  .footer-tag { font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.28); }
  .footer-links { display:flex; gap:24px; }
  .footer-links a { font-size:0.65rem; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.38); text-decoration:none; transition:color 0.3s; }
  .footer-links a:hover { color:var(--gold); }

  /* NOT FOUND */
  .not-found { padding:160px 60px 80px; text-align:center; }
  .not-found h2 { font-family:'Outfit',sans-serif; font-size:2rem; font-weight:300; color:var(--dark); margin-bottom:12px; }
  .not-found p { color:var(--soft); margin-bottom:28px; }

  /* CAROUSEL (mobile only) */
  .carousel { display:none; position:relative; width:100%; height:300px; overflow:hidden; background:var(--dark); }
  .carousel-track { display:flex; height:100%; transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94); will-change:transform; }
  .carousel-slide { flex:0 0 100%; height:100%; position:relative; overflow:hidden; }
  .carousel-slide img { width:100%; height:100%; object-fit:cover; display:block; }
  .carousel-btn { position:absolute; top:50%; transform:translateY(-50%); z-index:10; background:rgba(14,14,14,0.65); backdrop-filter:blur(6px); border:none; color:white; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; transition:background 0.2s; }
  .carousel-btn:hover { background:rgba(201,168,76,0.85); }
  .carousel-prev { left:14px; }
  .carousel-next { right:14px; }
  .carousel-dots { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); display:flex; gap:7px; z-index:10; }
  .carousel-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.4); border:none; cursor:pointer; padding:0; transition:all 0.25s; }
  .carousel-dot.active { background:var(--gold); transform:scale(1.25); }
  .carousel-counter { position:absolute; top:14px; right:14px; background:rgba(14,14,14,0.65); backdrop-filter:blur(6px); color:white; font-size:0.68rem; letter-spacing:0.12em; padding:5px 12px; z-index:10; }

  /* MOBILE */
  @media(max-width:1024px) {
    .detail-layout { grid-template-columns:1fr; }
    .detail-right { position:static; }
    .similar-grid { grid-template-columns:1fr 1fr; }
  }
  @media(max-width:900px) {
    nav{padding:16px 24px;} .nav-links,.nav-cta{display:none;} .hamburger{display:flex;}
    .breadcrumb { padding:88px 24px 0; }
    .gallery { padding:20px 24px 0; grid-template-rows:200px 200px; }
    .detail-layout { padding:36px 24px 60px; gap:36px; }
    .prop-specs-row { flex-wrap:wrap; }
    .prop-spec { min-width:50%; border-bottom:1px solid rgba(0,0,0,0.09); }
    .features-grid { grid-template-columns:1fr; }
    footer{padding:32px 24px;}
  }
  @media(max-width:640px) {
    nav{padding:16px 20px;}
    .breadcrumb { padding:84px 20px 0; }
    .gallery { display:none; }
    .carousel { display:block; }
    .detail-layout { padding:28px 20px 56px; }
    .similar-grid { grid-template-columns:1fr; }
    .map-embed { height:240px; }
    .map-footer { flex-direction:column; align-items:flex-start; gap:8px; }
    footer{padding:28px 20px; flex-direction:column; text-align:center;}
  }
</style>

  function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open');document.getElementById('hamburger').classList.toggle('open');}
  function closeMenu(){document.getElementById('mobileMenu').classList.remove('open');document.getElementById('hamburger').classList.remove('open');}
</script>
</head>

<script>
// ═══════════════════════════════════════════
//  PROPERTY DATA STORE — all 8 listings
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://ekyoqbzgaxhqtrhshlxd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVreW9xYnpnYXhocXRyaHNobHhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDAxNzQsImV4cCI6MjA4ODIxNjE3NH0.8vyzhjFGTGnbe5k7uZMxsQD6DoX4f4HZtcHkjaXxHWU';

let ALL_PROPERTIES = [];

// ═══ RENDER ═══
function getSimilar(prop) {
  const tags = Array.isArray(prop.tags) ? prop.tags : [];
  return ALL_PROPERTIES
    .filter(p => p.id !== prop.id && (p.market === prop.market || (Array.isArray(p.tags) && p.tags.some(t => tags.includes(t)))))
    .slice(0, 3);
}

function normalise(p) {
  // Supabase returns snake_case — map map_query → mapQuery
  return {
    ...p,
    mapQuery: p.map_query || p.mapQuery || '',
    images: Array.isArray(p.images) ? p.images : [],
    features: Array.isArray(p.features) ? p.features : [],
    tags: Array.isArray(p.tags) ? p.tags : [],
  };
}

function render(prop) {
  const app = document.getElementById('app');
  if (!prop) {
    app.innerHTML = `
      <div class="not-found">
        <h2>Property Not Found</h2>
        <p>This listing may have been removed or the link is incorrect.</p>
        <a href="listings.html" class="btn-primary" style="display:inline-block;padding:14px 32px;">← Back to Listings</a>
      </div>`;
    return;
  }

  document.title = `${prop.address} | Britnae Thomas`;
  const similar = getSimilar(prop);

  app.innerHTML = `
    <!-- MOBILE CAROUSEL -->
    <div class="carousel" id="carousel">
      <div class="carousel-track" id="carouselTrack">
        ${prop.images.map((src, i) => `<div class="carousel-slide"><img src="${src}" alt="${prop.address}" onclick="openLightbox(${JSON.stringify(prop.images)}, ${i})"></div>`).join('')}
      </div>
      <button class="carousel-btn carousel-prev" onclick="carouselMove(-1)">&#8592;</button>
      <button class="carousel-btn carousel-next" onclick="carouselMove(1)">&#8594;</button>
      <div class="carousel-dots" id="carouselDots">
        ${prop.images.map((_, i) => `<button class="carousel-dot ${i===0?'active':''}" onclick="carouselGo(${i})"></button>`).join('')}
      </div>
      <div class="carousel-counter" id="carouselCounter">1 / ${prop.images.length}</div>
    </div>

    <!-- DESKTOP GALLERY -->
    <div class="gallery">
      <div class="gallery-main" onclick="openLightbox(${JSON.stringify(prop.images)}, 0)">
        ${prop.video
          ? `<div class="gallery-video-wrap"><iframe src="${prop.video}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%;height:100%;"></iframe></div>`
          : `<img src="${prop.images[0] || ''}" alt="${prop.address}">`}
      </div>
      ${prop.images[1] ? `<div class="gallery-thumb" onclick="openLightbox(${JSON.stringify(prop.images)}, 1)"><img src="${prop.images[1]}" alt="View 2"></div>` : ''}
      ${prop.images[2] ? `<div class="gallery-thumb" onclick="openLightbox(${JSON.stringify(prop.images)}, 2)"><img src="${prop.images[2]}" alt="View 3"></div>` : ''}
      ${prop.images[3] && !prop.images[4]
        ? `<div class="gallery-thumb" onclick="openLightbox(${JSON.stringify(prop.images)}, 3)"><img src="${prop.images[3]}" alt="View 4"></div>`
        : prop.images[3]

// ═══ CAROUSEL ═══
let carouselIndex = 0;
let touchStartX = 0;

function carouselSync() {
  const slides = document.querySelectorAll('.carousel-slide');
  if (!slides.length) return;
  document.getElementById('carouselTrack').style.transform = `translateX(-${carouselIndex * 100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i === carouselIndex));
  document.getElementById('carouselCounter').textContent = `${carouselIndex + 1} / ${slides.length}`;
}

function carouselMove(dir) {
  const total = document.querySelectorAll('.carousel-slide').length;
  carouselIndex = (carouselIndex + dir + total) % total;
  carouselSync();
}

function carouselGo(i) {
  carouselIndex = i;
  carouselSync();
}

function initCarouselTouch() {
  const c = document.getElementById('carousel');
  if (!c) return;
  c.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive:true });
  c.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].screenX;
    if (Math.abs(diff) > 40) carouselMove(diff > 0 ? 1 : -1);
  }, { passive:true });
}

// ═══ LIGHTBOX ═══
let lightboxImages = [];
let lightboxIndex = 0;

function openLightbox(imgs, idx) {
  lightboxImages = imgs;
  lightboxIndex = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function closeLightboxOnBg(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function lightboxMove(dir) {
  lightboxIndex = (lightboxIndex + dir + lightboxImages.length) % lightboxImages.length;
  updateLightbox();
}

function updateLightbox() {
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
  document.getElementById('lightboxCounter').textContent = `${lightboxIndex + 1} / ${lightboxImages.length}`;
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') lightboxMove(1);
  if (e.key === 'ArrowLeft') lightboxMove(-1);
  if (e.key === 'Escape') closeLightbox();
});

// ═══ LOAD FROM SUPABASE ═══
async function loadProperty() {
  const app = document.getElementById('app');
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    app.innerHTML = `<div class="not-found"><h2>No property specified.</h2><a href="listings.html" class="btn-primary" style="display:inline-block;padding:14px 32px;">← Back to Listings</a></div>`;
    return;
  }

  app.innerHTML = `<div style="text-align:center;padding:120px 40px;color:var(--soft);font-size:0.85rem;letter-spacing:0.12em;text-transform:uppercase;">Loading property…</div>`;

  try {
    const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

    // Fetch all properties first (needed for similar section)
    const allRes = await fetch(`${SUPABASE_URL}/rest/v1/properties?order=id.asc`, { headers });
    if (!allRes.ok) throw new Error(`Supabase error ${allRes.status}: ${await allRes.text()}`);
    const allArr = await allRes.json();
    ALL_PROPERTIES = allArr.map(normalise);

    // Find the property by id from the full list (avoids type mismatch issues)
    const prop = ALL_PROPERTIES.find(p => String(p.id) === String(id)) || null;

    if (!prop) {
      app.innerHTML = `
        <div class="not-found">
          <h2>Property Not Found</h2>
          <p>This listing may have been removed or the link is incorrect.</p>
          <a href="listings.html" class="btn-primary" style="display:inline-block;padding:14px 32px;">← Back to Listings</a>
        </div>`;
      return;
    }

    render(prop);
  } catch(e) {
    console.error('loadProperty failed:', e);
    app.innerHTML = `
      <div class="not-found">
        <h2>Failed to load property.</h2>
        <p>${e.message || 'Please check your connection and try again.'}</p>
        <a href="listings.html" class="btn-primary" style="display:inline-block;padding:14px 32px;">← Back to Listings</a>
      </div>`;
  }
}

loadProperty();
</script>
